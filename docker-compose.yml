version: "3.9"

services:
  api:
    build: .
    container_name: healthbot-api
    env_file:
      - .env
    environment:
      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # Auth (can be overridden from .env)
      - AUTH_SECRET=${AUTH_SECRET:-change_this_secret_in_proDUCTION}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@healthbot.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      # Ollama LLM (optional)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-llava}
      # External health portals
      - HEALTH_PORTALS_ENABLED=${HEALTH_PORTALS_ENABLED:-false}
      - MOHFW_API_URL=${MOHFW_API_URL:-}
      - WHO_FEED_URL=${WHO_FEED_URL:-}
      - ICMR_API_URL=${ICMR_API_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: healthbot-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    command: serve
    restart: unless-stopped

volumes:
  ollama_data:
